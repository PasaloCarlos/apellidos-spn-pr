<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#e94560">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Mapa interactivo de apellidos de Puerto Rico y sus origenes en Espana">
  <title>Apellidos de Puerto Rico - Cap. 1: Espana</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1>Apellidos de <span>Puerto Rico</span></h1>
    <div class="chapter-nav">
      <button class="active">Cap. 1: Espana</button>
    </div>
  </header>

  <div class="main-container">
    <!-- Left: PR map + region list -->
    <div class="side-panel">
      <h3>
        Puerto Rico
        <button class="toggle-pr-map" onclick="togglePRMap()" title="Mostrar/ocultar mapa">&#9650;</button>
      </h3>
      <div id="pr-map"></div>
      <div class="region-list"></div>
    </div>

    <!-- Center: Spain map -->
    <div class="map-panel">
      <div id="stats-bar" class="stats-bar"></div>
      <div id="spain-map"></div>
      <div class="detail-overlay">
        <button class="close-btn" onclick="closeDetail()">&times;</button>
        <h2></h2>
        <div class="detail-grid"></div>
      </div>
    </div>

    <!-- Right: Data panel -->
    <div class="data-panel">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Buscar apellido..." />
      </div>
      <div class="filters">
        <select id="filter-origen">
          <option value="">Todos los origenes</option>
        </select>
        <select id="filter-sort">
          <option value="nombre">Ordenar: A-Z</option>
          <option value="rango">Ordenar: Rango</option>
          <option value="poblacion">Ordenar: Poblacion PR</option>
        </select>
      </div>
      <div class="results-header">Cargando...</div>
      <div class="apellido-list"></div>
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="mobile-nav">
    <button class="mobile-nav-btn active" data-view="map">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
      <span>Mapa</span>
    </button>
    <button class="mobile-nav-btn" data-view="regions">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
      <span>Regiones</span>
    </button>
    <button class="mobile-nav-btn" data-view="list">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
      <span>Apellidos</span>
    </button>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
